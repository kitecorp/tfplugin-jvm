# Publish tfplugin-jvm to Maven Central via Sonatype Central Portal
#
# Required secrets (kitecorp/tfplugin-jvm#2 — none of these exist yet; a
# maintainer must add them under Settings > Secrets and variables > Actions
# before this workflow can complete a real deploy):
#   MAVEN_USERNAME    - Sonatype Central Portal token username (from central.sonatype.com/account)
#   MAVEN_PASSWORD    - Sonatype Central Portal token password
#   GPG_PUBLIC_KEY    - Armored ASCII public key: gpg --armor --export YOUR_KEY_ID
#   GPG_PRIVATE_KEY   - Armored ASCII private key: gpg --armor --export-secret-keys YOUR_KEY_ID
#   GPG_PASSPHRASE    - GPG key passphrase (can be empty string if no passphrase)
#
# Also required once, outside of secrets: a verified `cloud.kitelang` namespace
# on the Sonatype Central Portal (https://central.sonatype.com).
#
# Usage:
#   Once published, consumers add the library as a dependency:
#     implementation 'cloud.kitelang:tfplugin-jvm:0.1.0'

name: Publish tfplugin-jvm to Maven Central

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for JReleaser

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true  # Fresh build for publishing

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Get version from Gradle
        id: version
        run: |
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Clean and build
        run: ./gradlew clean build --no-configuration-cache

      - name: Stage artifacts for JReleaser
        run: ./gradlew publishAllPublicationsToStagingDeployRepository --no-configuration-cache --rerun-tasks
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Deploy to Maven Central (via JReleaser Gradle plugin)
        run: ./gradlew jreleaserDeploy
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-maven-central
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties
